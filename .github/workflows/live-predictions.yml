name: Live predictions

on:
  schedule:
    - cron: "0 11 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: pip install -r backend/requirements.txt

      - name: Settle completed matches
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/update_results.py --days 2

      - name: Collect upcoming predictions
        working-directory: backend
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python scripts/collect.py

      - name: Commit updated predictions
        run: |
          git config user.name "tennisoracle-bot"
          git config user.email "actions@users.noreply.github.com"
          git add backend/data/live_predictions.json
          git diff --cached --quiet || git commit -m "chore: update live predictions [skip ci]"
          git push
